<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A premium Expense Tracker application to manage income and expenses.">
    <title>Expense Tracker | Dev Agency</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1>Expense Tracker</h1>
            <p class="subtitle">Manage your finances effortlessly</p>
        </header>

        <main class="dashboard">
            <section class="balance-card">
                <h2>Total Balance</h2>
                <h1 id="balance">$0.00</h1>
                <div class="summary">
                    <div class="summary-item income">
                        <h3>Income</h3>
                        <p id="income-total">+$0.00</p>
                    </div>
                    <div class="summary-item expense">
                        <h3>Expense</h3>
                        <p id="expense-total">-$0.00</p>
                    </div>
                    <div class="summary-item count">
                        <h3>Transactions</h3>
                        <p id="transaction-count">0</p>
                    </div>
                </div>
            </section>

            <section class="add-transaction">
                <h3 id="form-title">Add Transaction</h3>
                <form id="transaction-form">
                    <div class="form-control">
                        <label for="text">Description</label>
                        <input type="text" id="text" placeholder="e.g. Salary, Groceries" required autocomplete="off">
                        <span id="text-error" class="validation-error"></span>
                    </div>
                    <div class="form-control">
                        <label for="amount">Amount</label>
                        <input type="number" id="amount" placeholder="e.g. 1500" required step="0.01">
                        <span id="amount-error" class="validation-error"></span>
                    </div>
                    <div class="form-control">
                        <label for="type">Type</label>
                        <select id="type" required>
                            <option value="income">Income</option>
                            <option value="expense">Expense</option>
                        </select>
                    </div>
                    <input type="hidden" id="edit-id">
                    <div class="form-actions">
                        <button class="btn btn-primary" type="submit" id="submit-btn">Add Transaction</button>
                        <button class="btn btn-secondary hidden" type="button" id="cancel-btn">Cancel</button>
                    </div>
                </form>
            </section>

            <section class="controls">
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="Search transactions...">
                </div>
                <div class="filter-group">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="income">Income</button>
                    <button class="filter-btn" data-filter="expense">Expense</button>
                </div>
                <div class="sort-box">
                    <select id="sort-select">
                        <option value="">Sort By</option>
                        <option value="amount-asc">Amount (Low to High)</option>
                        <option value="amount-desc">Amount (High to Low)</option>
                        <option value="date-desc">Date (Newest)</option>
                        <option value="date-asc">Date (Oldest)</option>
                    </select>
                </div>
                <button class="btn btn-danger" id="clear-all-btn">Clear All</button>
            </section>

            <section class="history">
                <div class="history-header">
                    <h3>Recent Transactions</h3>
                </div>
                <ul id="transaction-list" class="transaction-list">
                    <!-- Transactions injected by render.js -->
                </ul>
                <div id="empty-state" class="empty-state">
                    <p>No transactions available.</p>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
