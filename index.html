<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A premium Expense Tracker application to manage income and expenses.">
    <title>Expense Tracker | Dev Agency</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1>Expense Tracker</h1>
            <p class="subtitle">Manage your finances effortlessly</p>
        </header>

        <main class="dashboard">
            <section class="balance-card">
                <h2>Total Balance</h2>
                <h1 id="balance">$0.00</h1>
                <div class="summary">
                    <div class="summary-item income">
                        <h3>Income</h3>
                        <p id="income-total">+$0.00</p>
                    </div>
                    <div class="summary-item expense">
                        <h3>Expense</h3>
                        <p id="expense-total">-$0.00</p>
                    </div>
                </div>
            </section>

            <section class="add-transaction">
                <h3 id="form-title">Add Transaction</h3>
                <form id="transaction-form">
                    <div class="form-control">
                        <label for="text">Description</label>
                        <input type="text" id="text" placeholder="e.g. Salary, Groceries" required autocomplete="off">
                    </div>
                    <div class="form-control">
                        <label for="amount">Amount <br>
                            <small class="hint-text">(negative - expense, positive - income)</small>
                        </label>
                        <input type="number" id="amount" placeholder="e.g. -50 or 1500" required step="0.01">
                    </div>
                    <input type="hidden" id="edit-id">
                    <div class="form-actions">
                        <button class="btn btn-primary" type="submit" id="submit-btn">Add Transaction</button>
                        <button class="btn btn-secondary hidden" type="button" id="cancel-btn">Cancel</button>
                    </div>
                </form>
            </section>

            <section class="history">
                <div class="history-header">
                    <h3>Recent Transactions</h3>
                </div>
                <ul id="transaction-list" class="transaction-list">
                    <!-- Transactions injected by render.js -->
                </ul>
                <div id="empty-state" class="empty-state">
                    <p>No transactions yet.</p>
                </div>
            </section>
        </main>
    </div>

    <!-- Modular JS -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
